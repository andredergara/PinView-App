openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PinView Golf Social Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User profile operations
  - name: posts
    description: Golf shot video posts
  - name: feed
    description: Feed operations
  - name: discover
    description: Discovery and search
  - name: notifications
    description: Notifications
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Created user with session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out

  # Users
  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/posts:
    get:
      operationId: getUserPosts
      tags: [users]
      summary: Get posts by a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: User posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /users/{userId}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get golfer stats for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User golf stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/{userId}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Followed

    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unfollowed

  /users/{userId}/followers:
    get:
      operationId: getUserFollowers
      tags: [users]
      summary: Get user followers
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCard"

  /users/{userId}/following:
    get:
      operationId: getUserFollowing
      tags: [users]
      summary: Get users a user is following
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCard"

  /users/{userId}/saved:
    get:
      operationId: getUserSaved
      tags: [users]
      summary: Get posts saved by a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Saved posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /users/{userId}/block:
    post:
      operationId: blockUser
      tags: [users]
      summary: Block a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blocked

    delete:
      operationId: unblockUser
      tags: [users]
      summary: Unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unblocked

  # Posts
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new golf shot post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /posts/{postId}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Liked

    delete:
      operationId: unlikePost
      tags: [posts]
      summary: Unlike a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unliked

  /posts/{postId}/save:
    post:
      operationId: savePost
      tags: [posts]
      summary: Save a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Saved

    delete:
      operationId: unsavePost
      tags: [posts]
      summary: Unsave a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsaved

  /posts/{postId}/comments:
    get:
      operationId: getPostComments
      tags: [posts]
      summary: Get comments for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      operationId: createComment
      tags: [posts]
      summary: Comment on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/{postId}/comments/{commentId}:
    delete:
      operationId: deleteComment
      tags: [posts]
      summary: Delete own comment
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  # Feed
  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get home feed (posts from followed users + featured)
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /feed/trending:
    get:
      operationId: getTrendingPosts
      tags: [feed]
      summary: Get trending golf shots
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Trending posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  # Discover
  /discover/search:
    get:
      operationId: search
      tags: [discover]
      summary: Search golfers, courses, and posts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [all, users, posts, courses]
            default: all
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /discover/trending-creators:
    get:
      operationId: getTrendingCreators
      tags: [discover]
      summary: Get trending golfer creators
      responses:
        "200":
          description: Trending creators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCard"

  /discover/trending-courses:
    get:
      operationId: getTrendingCourses
      tags: [discover]
      summary: Get trending golf courses
      responses:
        "200":
          description: Trending courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseCard"

  # Storage
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # Notifications
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsPage"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Get count of unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/mark-read:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark notifications as read
      responses:
        "200":
          description: Marked read

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        handicap:
          type: number
          nullable: true
        homeCourse:
          type: string
          nullable: true
        followersCount:
          type: integer
        followingCount:
          type: integer
        isBlocked:
          type: boolean
        postsCount:
          type: integer
        isFollowing:
          type: boolean
        createdAt:
          type: string
      required: [id, username, displayName, followersCount, followingCount, postsCount, isFollowing, createdAt]

    UserProfile:
      allOf:
        - $ref: "#/components/schemas/User"

    UserCard:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        handicap:
          type: number
          nullable: true
        homeCourse:
          type: string
          nullable: true
        followersCount:
          type: integer
        isFollowing:
          type: boolean
      required: [id, username, displayName, followersCount, isFollowing]

    UserStats:
      type: object
      properties:
        totalShots:
          type: integer
        totalLikes:
          type: integer
        avgDistance:
          type: number
          nullable: true
        longestShot:
          type: number
          nullable: true
        topShotType:
          type: string
          nullable: true
        topClub:
          type: string
          nullable: true
      required: [totalShots, totalLikes]

    Post:
      type: object
      properties:
        id:
          type: string
        author:
          $ref: "#/components/schemas/UserCard"
        caption:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        course:
          type: string
          nullable: true
        holeNumber:
          type: integer
          nullable: true
        club:
          type: string
          nullable: true
        distance:
          type: integer
          nullable: true
        shotShape:
          type: string
          enum: [Straight, Draw, Fade, Hook, Slice]
          nullable: true
        shotType:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        savesCount:
          type: integer
        isLiked:
          type: boolean
        isSaved:
          type: boolean
        createdAt:
          type: string
      required: [id, author, tags, likesCount, commentsCount, savesCount, isLiked, isSaved, createdAt]

    Comment:
      type: object
      properties:
        id:
          type: string
        author:
          $ref: "#/components/schemas/UserCard"
        text:
          type: string
        createdAt:
          type: string
      required: [id, author, text, createdAt]

    CourseCard:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
          nullable: true
        postsCount:
          type: integer
        thumbnailUrl:
          type: string
          nullable: true
      required: [name, postsCount]

    PostsPage:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
      required: [posts, hasMore]

    NotificationsPage:
      type: object
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
      required: [notifications, hasMore]

    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [like, comment, follow, featured, trending]
        actor:
          $ref: "#/components/schemas/UserCard"
        post:
          $ref: "#/components/schemas/Post"
          nullable: true
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, type, actor, message, isRead, createdAt]

    UnreadCount:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    SearchResults:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserCard"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        courses:
          type: array
          items:
            $ref: "#/components/schemas/CourseCard"
      required: [users, posts, courses]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterBody:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        password:
          type: string
        handicap:
          type: number
          nullable: true
        homeCourse:
          type: string
          nullable: true
      required: [username, displayName, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required: [user]

    UpdateUserBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        handicap:
          type: number
          nullable: true
        homeCourse:
          type: string
          nullable: true

    CreatePostBody:
      type: object
      properties:
        caption:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        course:
          type: string
          nullable: true
        holeNumber:
          type: integer
          nullable: true
        club:
          type: string
          nullable: true
        distance:
          type: integer
          nullable: true
        shotShape:
          type: string
          enum: [Straight, Draw, Fade, Hook, Slice]
          nullable: true
        shotType:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    CreateCommentBody:
      type: object
      properties:
        text:
          type: string
      required: [text]
